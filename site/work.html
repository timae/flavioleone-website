<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Photography portfolio — Flavio Leone">
    <title>Work — Flavio Leone</title>
    <link rel="preconnect" href="https://freight.cargo.site">
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
    <nav class="site-nav" role="navigation">
        <a href="/index.html" class="nav-logo" aria-label="Home">Flavio Leone</a>
        <div class="nav-links">
            <a href="/work.html" aria-current="page">Work</a>
            <a href="/about.html">About</a>
            <a href="/contact.html">Contact</a>
        </div>
    </nav>

    <main>
        <header class="page-header">
            <h1>All Work</h1>
        </header>

        <section class="full-gallery" aria-label="Complete portfolio">
            <div class="gallery-grid" id="work-gallery">
                <!-- Populated by app.js from /assets/work.json -->
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Flavio Leone. All rights reserved.</p>
    </footer>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
        <button class="lightbox-close" aria-label="Close viewer">&times;</button>
        <button class="lightbox-prev" aria-label="Previous image">&lsaquo;</button>
        <button class="lightbox-next" aria-label="Next image">&rsaquo;</button>
        <div class="lightbox-content">
            <img src="" alt="" id="lightbox-img">
            <div class="lightbox-counter" id="lightbox-counter"></div>
        </div>
    </div>

    <script src="/assets/app.js"></script>
</body>
</html>
